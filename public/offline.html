<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Нет соединения — SellerMap</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0c0e0f; color: #e8eaed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px; text-align: center;
    }
    .card { max-width: 360px; }
    .logo { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .logo span { color: #22e57f; }
    .icon { width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 16px;
      background: rgba(34,229,127,0.12); color: #22e57f; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.5; color: #9aa0a6; margin: 0 0 20px; }
    button {
      appearance: none; border: 0; cursor: pointer; font-size: 14px; font-weight: 600;
      background: #22e57f; color: #0c0e0f; padding: 10px 20px; border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Seller<span>Map</span></div>
    <div class="icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    </div>
    <h1>Нет соединения</h1>
    <p>Не удалось загрузить страницу. Проверьте интернет — данные синхронизируются, как только связь восстановится.</p>
    <button onclick="location.reload()">Повторить</button>
  </div>
</body>
</html>
